<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">保费融资判断路径示意</title>
  <desc id="desc">从家庭现金流、融资条件到压力测试的三段判断路径。</desc>
  <rect width="1200" height="680" rx="44" fill="#f4f7fb"/>
  <text x="74" y="92" fill="#27364d" font-family="Arial, PingFang SC, sans-serif" font-size="34" font-weight="700">保费融资不是收益放大器，而是一张现金流压力测试表</text>
  <text x="74" y="134" fill="#728097" font-family="Arial, PingFang SC, sans-serif" font-size="20">Demo 配图 · 用于验证 Markdown 图片渲染与灯箱预览</text>
  <g transform="translate(74 205)">
    <rect width="290" height="310" rx="26" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
    <circle cx="54" cy="56" r="24" fill="#e9f0ff"/>
    <text x="46" y="65" fill="#4d73d9" font-family="Arial" font-size="26" font-weight="700">1</text>
    <text x="92" y="64" fill="#33445c" font-family="Arial, PingFang SC, sans-serif" font-size="26" font-weight="700">先看家庭账本</text>
    <text x="40" y="125" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 首期保费从哪里来</text>
    <text x="40" y="171" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 利息由谁持续承担</text>
    <text x="40" y="217" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 是否挤压应急资金</text>
    <rect x="40" y="260" width="210" height="12" rx="6" fill="#e9eef5"/>
    <rect x="40" y="260" width="132" height="12" rx="6" fill="#86a2e4"/>
  </g>
  <path d="M382 360h75" stroke="#aebbd0" stroke-width="4" stroke-linecap="round"/>
  <path d="m445 347 18 13-18 13" fill="none" stroke="#aebbd0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(455 205)">
    <rect width="290" height="310" rx="26" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
    <circle cx="54" cy="56" r="24" fill="#eef8f3"/>
    <text x="46" y="65" fill="#2f9b71" font-family="Arial" font-size="26" font-weight="700">2</text>
    <text x="92" y="64" fill="#33445c" font-family="Arial, PingFang SC, sans-serif" font-size="26" font-weight="700">再拆融资条件</text>
    <text x="40" y="125" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 利率是否会变化</text>
    <text x="40" y="171" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 续贷是否有前提</text>
    <text x="40" y="217" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 汇率如何影响成本</text>
    <rect x="40" y="260" width="210" height="12" rx="6" fill="#e9eef5"/>
    <rect x="40" y="260" width="164" height="12" rx="6" fill="#6cb492"/>
  </g>
  <path d="M763 360h75" stroke="#aebbd0" stroke-width="4" stroke-linecap="round"/>
  <path d="m826 347 18 13-18 13" fill="none" stroke="#aebbd0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(836 205)">
    <rect width="290" height="310" rx="26" fill="#ffffff" stroke="#dbe3ef" stroke-width="2"/>
    <circle cx="54" cy="56" r="24" fill="#fff2e4"/>
    <text x="46" y="65" fill="#d78a37" font-family="Arial" font-size="26" font-weight="700">3</text>
    <text x="92" y="64" fill="#33445c" font-family="Arial, PingFang SC, sans-serif" font-size="26" font-weight="700">最后做压力测试</text>
    <text x="40" y="125" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 利率上升还能否承受</text>
    <text x="40" y="171" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 分红偏低如何处理</text>
    <text x="40" y="217" fill="#718096" font-family="Arial, PingFang SC, sans-serif" font-size="20">• 提前退出损失多大</text>
    <rect x="40" y="260" width="210" height="12" rx="6" fill="#e9eef5"/>
    <rect x="40" y="260" width="102" height="12" rx="6" fill="#e2a05c"/>
  </g>
  <text x="74" y="610" fill="#596b83" font-family="Arial, PingFang SC, sans-serif" font-size="23">结论：先证明家庭扛得住最坏情况，再讨论杠杆有没有意义。</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">分红实现率阅读框架示意</title>
  <desc id="desc">展示口径、时间、产品与客户目标四个判断维度。</desc>
  <rect width="1200" height="680" rx="44" fill="#f7f5fb"/>
  <text x="72" y="88" fill="#2d3448" font-family="Arial, PingFang SC, sans-serif" font-size="36" font-weight="700">看到“分红实现率”，先别急着只看一个百分比</text>
  <text x="72" y="132" fill="#7d8090" font-family="Arial, PingFang SC, sans-serif" font-size="20">Demo 配图 · 四个维度决定这个数字能不能用于判断</text>
  <g transform="translate(72 196)">
    <rect width="500" height="164" rx="26" fill="#ffffff" stroke="#e1ddec" stroke-width="2"/>
    <rect x="32" y="30" width="74" height="74" rx="20" fill="#eee9fa"/>
    <text x="52" y="80" fill="#8069c6" font-family="Arial" font-size="36" font-weight="700">01</text>
    <text x="138" y="68" fill="#3e465b" font-family="Arial, PingFang SC, sans-serif" font-size="27" font-weight="700">口径</text>
    <text x="138" y="108" fill="#737b8c" font-family="Arial, PingFang SC, sans-serif" font-size="20">比较的是哪一种红利、哪一批保单？</text>
  </g>
  <g transform="translate(628 196)">
    <rect width="500" height="164" rx="26" fill="#ffffff" stroke="#e1ddec" stroke-width="2"/>
    <rect x="32" y="30" width="74" height="74" rx="20" fill="#e9f0ff"/>
    <text x="52" y="80" fill="#4d73d9" font-family="Arial" font-size="36" font-weight="700">02</text>
    <text x="138" y="68" fill="#3e465b" font-family="Arial, PingFang SC, sans-serif" font-size="27" font-weight="700">时间</text>
    <text x="138" y="108" fill="#737b8c" font-family="Arial, PingFang SC, sans-serif" font-size="20">单年波动还是多年持续偏离？</text>
  </g>
  <g transform="translate(72 398)">
    <rect width="500" height="164" rx="26" fill="#ffffff" stroke="#e1ddec" stroke-width="2"/>
    <rect x="32" y="30" width="74" height="74" rx="20" fill="#edf8f3"/>
    <text x="52" y="80" fill="#2f9b71" font-family="Arial" font-size="36" font-weight="700">03</text>
    <text x="138" y="68" fill="#3e465b" font-family="Arial, PingFang SC, sans-serif" font-size="27" font-weight="700">产品</text>
    <text x="138" y="108" fill="#737b8c" font-family="Arial, PingFang SC, sans-serif" font-size="20">旧产品表现能否代表新产品？</text>
  </g>
  <g transform="translate(628 398)">
    <rect width="500" height="164" rx="26" fill="#ffffff" stroke="#e1ddec" stroke-width="2"/>
    <rect x="32" y="30" width="74" height="74" rx="20" fill="#fff3e6"/>
    <text x="52" y="80" fill="#d78a37" font-family="Arial" font-size="36" font-weight="700">04</text>
    <text x="138" y="68" fill="#3e465b" font-family="Arial, PingFang SC, sans-serif" font-size="27" font-weight="700">目标</text>
    <text x="138" y="108" fill="#737b8c" font-family="Arial, PingFang SC, sans-serif" font-size="20">这个数字会不会破坏你的现金流目标？</text>
  </g>
  <text x="72" y="630" fill="#60687a" font-family="Arial, PingFang SC, sans-serif" font-size="23">先核对口径，再比较趋势；最后回到具体产品与家庭目标。</text>
</svg>

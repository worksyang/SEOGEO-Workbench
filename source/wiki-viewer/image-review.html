<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Wiki 图片复核</title>
<style>
:root{
  --bg:#f7f4ee;
  --card:#ffffff;
  --line:#ddd4c6;
  --text:#2f2a24;
  --muted:#786e61;
  --high:#8f2d2d;
  --review:#8a5a00;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
}
main{
  max-width:1120px;
  margin:0 auto;
  padding:24px;
}
h1{
  margin:0 0 8px;
  font-size:28px;
}
.intro{
  margin:0 0 18px;
  color:var(--muted);
  line-height:1.6;
}
.summary{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  margin:0 0 28px;
}
.summary-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  padding:14px 16px;
}
.summary-card strong{
  display:block;
  font-size:22px;
  margin-top:6px;
}
section{
  margin-bottom:28px;
}
section h2{
  margin:0 0 10px;
  font-size:20px;
}
section p{
  margin:0 0 14px;
  color:var(--muted);
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:16px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  overflow:hidden;
}
.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}
.badge.high{
  background:#fde8e8;
  color:var(--high);
}
.badge.review{
  background:#fff3d6;
  color:var(--review);
}
.meta{
  padding:14px 16px 10px;
  border-bottom:1px solid var(--line);
}
.meta-title{
  margin:0 0 8px;
  font-size:15px;
  line-height:1.5;
  word-break:break-word;
}
.meta-line{
  margin:4px 0;
  font-size:13px;
  color:var(--muted);
  word-break:break-word;
}
.preview{
  padding:16px;
  background:#faf8f3;
}
.preview img{
  display:block;
  width:100%;
  height:auto;
  background:#fff;
  border:1px solid var(--line);
}
.actions{
  display:flex;
  gap:10px;
  padding:0 16px 16px;
}
.actions a{
  color:#0b57d0;
  text-decoration:none;
  font-size:13px;
}
.empty{
  padding:16px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:12px;
  color:var(--muted);
}
@media (max-width:640px){
  main{padding:16px}
}
</style>
</head>
<body>
<main>
  <h1>Wiki 疑似坏图复核</h1>
  <p class="intro">
    这个页面直接读取 <code>wiki-image-probe.json</code>，并且对页面和图片请求都显式关闭 <code>Referer</code>。
    你只需要肉眼看图是不是正常正文图，不需要判断头信息。
  </p>
  <div class="summary" id="summary"></div>
  <section>
    <h2>优先人工判断</h2>
    <p>这里是脚本不敢直接判死的图片，优先看。</p>
    <div class="grid" id="review-list"></div>
  </section>
  <section>
    <h2>高置信坏图</h2>
    <p>这组基本已经命中统一坏图特征。你可以抽查几张，确认肉眼表现是否都是细横条或占位图。</p>
    <div class="grid" id="high-list"></div>
  </section>
</main>
<script>
function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function cardHtml(row) {
  const severity = row.severity || "review";
  const size = row.content_length ?? row.downloaded_bytes ?? "-";
  const dims = row.width && row.height ? `${row.width} × ${row.height}` : "-";
  const flags = Array.isArray(row.flags) ? row.flags.join(", ") : "-";
  const extra = [];
  if (row.x_info) extra.push(`x-info: ${row.x_info}`);
  if (row.x_errno) extra.push(`x-errno: ${row.x_errno}`);
  if (row.error) extra.push(`error: ${row.error}`);
  return `
    <article class="card">
      <div class="meta">
        <div class="meta-title">
          <span class="badge ${escapeHtml(severity)}">${escapeHtml(severity)}</span>
          ${escapeHtml(row.path)}:${escapeHtml(row.line)}
        </div>
        <div class="meta-line">flags: ${escapeHtml(flags)}</div>
        <div class="meta-line">bytes: ${escapeHtml(size)} | 尺寸: ${escapeHtml(dims)}</div>
        ${extra.map(item => `<div class="meta-line">${escapeHtml(item)}</div>`).join("")}
      </div>
      <div class="preview">
        <img src="${escapeHtml(row.url)}" alt="" loading="lazy" referrerpolicy="no-referrer">
      </div>
      <div class="actions">
        <a href="${escapeHtml(row.url)}" target="_blank" rel="noreferrer">新窗口打开图片</a>
      </div>
    </article>
  `;
}

function renderList(el, rows) {
  if (!rows.length) {
    el.innerHTML = '<div class="empty">这一组没有数据。</div>';
    return;
  }
  el.innerHTML = rows.map(cardHtml).join("");
}

function renderSummary(data, flagged, high, review) {
  document.getElementById("summary").innerHTML = `
    <div class="summary-card">Wiki 图片引用<strong>${escapeHtml(data.markdown_refs)}</strong></div>
    <div class="summary-card">唯一图片 URL<strong>${escapeHtml(data.unique_urls)}</strong></div>
    <div class="summary-card">异常图片<strong>${escapeHtml(flagged.length)}</strong></div>
    <div class="summary-card">高置信坏图<strong>${escapeHtml(high.length)}</strong></div>
    <div class="summary-card">待人工判断<strong>${escapeHtml(review.length)}</strong></div>
  `;
}

fetch("wiki-image-probe.json", { cache: "no-store" })
  .then(response => {
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    return response.json();
  })
  .then(data => {
    const flagged = (data.results || []).filter(row => Array.isArray(row.flags) && row.flags.length);
    const review = flagged.filter(row => row.severity === "review");
    const high = flagged.filter(row => row.severity === "high");
    renderSummary(data, flagged, high, review);
    renderList(document.getElementById("review-list"), review);
    renderList(document.getElementById("high-list"), high);
  })
  .catch(error => {
    document.getElementById("summary").innerHTML = `<div class="empty">读取 JSON 失败：${escapeHtml(error.message)}</div>`;
    document.getElementById("review-list").innerHTML = "";
    document.getElementById("high-list").innerHTML = "";
  });
</script>
</body>
</html>
